<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文件提交</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="submit-shell">
    <section class="submit-card">
      <div id="submitHeader" class="submit-hero">
        <p class="eyebrow">FILE SUBMISSION</p>
        <h1>加载任务中</h1>
        <p>请稍候。</p>
      </div>

      <div id="statusShortcut" class="status-shortcut" hidden></div>

      <form id="submitForm" class="submit-form" hidden>
        <div id="dynamicFields"></div>

        <label class="upload-zone">
          <strong>上传文件</strong>
          <span id="fileRules" class="hint"></span>
          <input id="files" name="files" type="file" multiple>
        </label>
        <div id="fileQueue" class="submit-file-queue" hidden></div>

        <progress id="progress" value="0" max="100" hidden></progress>

        <div class="submit-actions">
          <button class="primary" type="submit">提交文件</button>
          <button type="reset">重填</button>
        </div>
      </form>
      <p id="submitMessage" class="message submit-form"></p>
    </section>
    <footer class="app-footer submit-footer">
      <span>© 2026 Filestore</span>
      <a href="https://github.com/sx120609/filestore/" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </main>

  <dialog id="successDialog" class="success-dialog">
    <div class="success-check" aria-hidden="true">
      <svg viewBox="0 0 64 64" role="img">
        <circle cx="32" cy="32" r="28"></circle>
        <path d="M19 33.5 28 42 46 23"></path>
      </svg>
    </div>
    <h2>提交成功</h2>
    <p id="successSummary"></p>
    <div id="successFiles" class="success-files"></div>
    <div class="success-actions">
      <a id="successStatusLink" class="primary success-status-link" href="#">查看提交成功名单</a>
      <button id="closeSuccessDialog" type="button">关闭</button>
    </div>
  </dialog>
  <script src="/submit.js"></script>
</body>
</html>
